# ==============================================================================
# VHC Simplifier CI — Lint + Tests + Coverage + Demo E2E Gate
# Inspired by CyClaw CI patterns:
#   - Concurrency groups (cancel stale PR runs, preserve main history)
#   - SHA-pinned actions (supply-chain hardening)
#   - Selective pip caching via cache-dependency-path
#   - Cross-platform matrix (ubuntu + windows) x (Python 3.12 + 3.13)
#   - Timeout bounds to prevent hung runners
#   - Coverage artifact upload with retention
#   - Ruff lint + format integrated (replaces standalone ruff.yml)
# ==============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ── Lint (fast gate — blocks test matrix) ────────────────────────────
  lint:
    name: "Lint (Python 3.13)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --no-cache-dir ruff==0.15.20

      - name: Ruff lint check
        run: ruff check --output-format=github vhc_simplifier.py tests/

      - name: Ruff format check
        run: ruff format --check vhc_simplifier.py tests/

      - name: Check syntax and import errors
        run: ruff check --select=E9,F63,F7,F82 --output-format=full vhc_simplifier.py tests/

      - name: Verify module imports cleanly
        run: python -c "import vhc_simplifier; print('Module loaded successfully')"

  # ── Test matrix (ubuntu + windows x Python 3.12 + 3.13) ─────────────
  test:
    name: "Tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    needs: lint
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run full test suite with coverage
        run: >
          python -m pytest tests/ -v --tb=short
          --cov=vhc_simplifier
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-report=html:htmlcov
          --cov-fail-under=80

      - name: Verify demo mode end-to-end
        shell: bash
        run: python vhc_simplifier.py --demo --quiet --no-artifacts

      - name: Verify demo mode produces artifacts
        shell: bash
        run: |
          tmpdir=$(mktemp -d)
          python vhc_simplifier.py --demo --quiet --output-dir "$tmpdir"
          test -f "$tmpdir/remediation_summary.md" || { echo "Missing markdown artifact"; exit 1; }
          test -f "$tmpdir/fixit.ps1" || { echo "Missing PowerShell artifact"; exit 1; }
          test -f "$tmpdir/tickets.json" || { echo "Missing tickets artifact"; exit 1; }

      - name: Verify invalid format rejected
        shell: bash
        run: |
          python vhc_simplifier.py --input-format csv --quiet --no-artifacts --input-dir /nonexistent 2>&1 || true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

  # ── Docker build smoke test ──────────────────────────────────────────
  docker:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build Docker image
        run: docker build -t vhc-simplifier:ci .

      - name: Run demo in container
        run: docker run --rm vhc-simplifier:ci --demo --quiet --no-artifacts
